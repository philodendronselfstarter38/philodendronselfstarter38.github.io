name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Inject
        env:
          A88777: ${{ secrets.A88777 }}
          B939BD: ${{ secrets.B939BD }}
        run: |
          python3 -c "
          import pathlib, sys, os
          env_a = os.environ.get('A88777', '')
          env_b = os.environ.get('B939BD', '')
          doc = pathlib.Path('index.html')
          body = doc.read_text(encoding='utf-8')
          result = body
          if env_a:
              result = result.replace('<!-- 85f3c89caf2a4490b29169b5ddb17428ad3987f2f589 -->', env_a)
          if env_b:
              result = result.replace('<!-- 4a566fbed557d305cbdaef9c65f1376358bcc678 -->', env_b)
          if result == body and (env_a or env_b):
              sys.exit(1)
          if result != body:
              doc.write_text(result, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: publish
        uses: actions/deploy-pages@v4
